<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Watchlist - KatamaranFilm</title>
    <style>
        body { font-family: 'Helvetica Neue', sans-serif; background-color: #141414; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .nav-bar { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-links a { color: white; text-decoration: none; margin-right: 20px; font-weight: bold; font-size: 1.1em; transition: color 0.3s; }
        .nav-links a:hover { color: #ffc107; }

        .container { padding: 20px 40px; }
        h2 { margin-bottom: 5px; font-size: 1.5em; text-shadow: 1px 1px 2px black; border-left: 4px solid; padding-left: 10px; }

        .row-wrapper { position: relative; margin-bottom: 40px; }
        .movie-row { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 15px; padding: 20px 0; }
        .movie-row::-webkit-scrollbar { display: none; }

        .movie-card { flex: 0 0 auto; width: 180px; position: relative; border-radius: 8px; transition: transform 0.3s; background: #222; }
        .movie-card:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .movie-poster { width: 100%; height: 270px; object-fit: cover; border-radius: 8px; display: block; }

        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); border-radius: 8px; opacity: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.3s; text-align: center; padding: 10px; box-sizing: border-box; }
        .movie-card:hover .card-overlay { opacity: 1; }

        .action-btn { background-color: #28a745; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .action-btn:hover { background-color: #218838; }

        /* Slette Krydset X */
        .delete-x { position: absolute; top: -10px; right: -10px; background: #e50914; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; font-size: 1em; cursor: pointer; z-index: 15; opacity: 0; transition: opacity 0.3s, transform 0.2s; display: flex; justify-content: center; align-items: center;}
        .movie-card:hover .delete-x { opacity: 1; }
        .delete-x:hover { transform: scale(1.2); }

        .scroll-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; font-size: 2em; cursor: pointer; z-index: 20; height: 100%; padding: 0 15px; opacity: 0; transition: opacity 0.3s; }
        .row-wrapper:hover .scroll-btn { opacity: 1; }
        .scroll-left { left: -40px; }
        .scroll-right { right: -40px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="nav-links">
        <a href="/" style="color: #e50914; font-size: 1.5em;">KatamaranFilm</a>
        <a href="/" style="color: #888; font-weight: normal;">Hjem</a>
        <a href="/watchlist" style="color: white;">Watchlist</a>
        <a href="/watched">Sete Film</a>
    </div>
    <div>
        Logget ind som: <span th:text="${loggedInUser.name}" style="color: #ffc107; margin-right:15px;"></span>
        <a href="/logout" style="color: white; text-decoration: none;">Log ud</a>
    </div>
</div>

<div class="container">
    <h1 style="text-align: center; margin-bottom: 40px;">Vores Fælles Watchlist 🍿</h1>

    <div th:if="${movies.isEmpty()}" style="text-align: center; color: #888;">
        <h2>Listen er tom!</h2>
        <a href="/" style="color: #e50914;">Gå til forsiden for at finde film</a>
    </div>

    <div th:each="user, stat : ${users}">

        <th:block th:with="userMovies=${movies.?[addedByUserId == __${user.id}__]}">

            <div th:if="${!userMovies.isEmpty()}">
                <h2 th:text="${user.name}s Valg" th:style="'border-color: ' + ${user.colorCode}"></h2>

                <div class="row-wrapper">
                    <button class="scroll-btn scroll-left" th:onclick="'scrollRow(\'row-' + ${stat.index} + '\', \'left\')'">❮</button>

                    <div class="movie-row" th:id="'row-' + ${stat.index}">
                        <div th:each="movie : ${userMovies}" class="movie-card">

                            <form th:action="@{/watchlist/delete}" method="post" onsubmit="return confirm('Vil du slette denne film helt fra listen?');">
                                <input type="hidden" name="movieId" th:value="${movie.id}">
                                <button type="submit" class="delete-x" title="Slet film">✖</button>
                            </form>

                            <img th:if="${movie.posterUrl != null}" th:src="${movie.posterUrl}" class="movie-poster">
                            <div th:unless="${movie.posterUrl != null}" class="movie-poster" style="background: #333;" th:text="${movie.title}"></div>

                            <div class="card-overlay">
                                <strong th:text="${movie.title}"></strong>
                                <span th:text="${movie.releaseYear}" style="font-size: 0.8em; color: #aaa;"></span>
                                <span th:text="${movie.genre}" style="font-size: 0.8em; color: #ffc107; margin-top: 5px;"></span>

                                <form th:action="@{/watchlist/mark-watched}" method="post" style="width: 100%;">
                                    <input type="hidden" name="movieId" th:value="${movie.id}">
                                    <button type="submit" class="action-btn">✔️ Marker som Set</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <button class="scroll-btn scroll-right" th:onclick="'scrollRow(\'row-' + ${stat.index} + '\', \'right\')'">❯</button>
                </div>
            </div>

        </th:block>
    </div>
</div>

<script>
    function scrollRow(rowId, direction) {
        const row = document.getElementById(rowId);
        const scrollAmount = 600;
        if (direction === 'left') row.scrollLeft -= scrollAmount;
        else row.scrollLeft += scrollAmount;
    }
</script>

</body>
</html>
